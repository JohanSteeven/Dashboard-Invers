# Healthcare Analytics — Infraestructura Docker
#
# Servicios:
#   - postgres: Base de datos PostgreSQL 16 para el modelo dimensional
#   - metabase: Herramienta de BI para el dashboard (Fase 4)
#   - pipeline-api: Servidor HTTP que expone los scripts ETL (Fase 5)
#   - n8n: Orquestador visual del pipeline (Fase 5)
#
# Uso:
#   docker compose up -d      # Levantar todos los servicios
#   docker compose ps         # Verificar estado
#   docker compose down       # Detener servicios
#   docker compose logs -f    # Ver logs en tiempo real

services:
  # PostgreSQL — Base de datos analítica
  postgres:
    image: postgres:16-alpine
    container_name: healthcare-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-healthcare_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - healthcare-network

  # Metabase — Dashboard de visualización (Fase 4)
  metabase:
    image: metabase/metabase:latest
    container_name: healthcare-metabase
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: h2
    networks:
      - healthcare-network

  # Pipeline API — Servidor HTTP que expone los scripts ETL (Fase 5)
  pipeline-api:
    image: python:3.12-slim
    container_name: healthcare-pipeline
    working_dir: /app
    command: >
      sh -c "pip install -r requirements.txt -q &&
             python optional/pipeline_api.py 8080"
    volumes:
      - .:/app
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB_HOST=postgres
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-healthcare_db}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-admin}
    networks:
      - healthcare-network

  # n8n — Orquestador visual del pipeline (Fase 5)
  n8n:
    image: n8nio/n8n:latest
    container_name: healthcare-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-admin123}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - pipeline-api
    networks:
      - healthcare-network

volumes:
  postgres_data:
    driver: local
  n8n_data:
    driver: local

networks:
  healthcare-network:
    driver: bridge
